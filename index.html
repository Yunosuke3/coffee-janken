<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>☕ コーヒーじゃんけん</title>
<style>
  :root {
    --coffee-dark: #4b2e1f;
    --coffee-mid: #8b5a3c;
    --cream: #f7ecd7;
    --cream-light: #fff8ec;
    --accent: #ff9a3c;
    --accent-strong: #e8772e;
    --danger: #d94e4e;
    --success: #3fae7d;
    --shadow: 0 6px 18px rgba(75, 46, 31, 0.18);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    color: var(--coffee-dark);
    background:
      radial-gradient(circle at 20% 20%, #ffd89b 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #ffe4b5 0%, transparent 40%),
      var(--cream);
  }

  .app {
    min-height: 100vh;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header.brand {
    text-align: center;
    margin-bottom: 24px;
  }
  header.brand h1 {
    margin: 0;
    font-size: clamp(24px, 6vw, 36px);
    letter-spacing: 0.04em;
  }
  header.brand .sub {
    margin-top: 4px;
    color: var(--coffee-mid);
    font-size: 14px;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--cream-light);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 3px solid #fff;
  }

  label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: var(--coffee-mid);
    font-weight: 600;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid #e6d4b8;
    background: #fff;
    font-size: 16px;
    font-family: inherit;
    color: var(--coffee-dark);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"].code {
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    text-align: center;
  }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  button {
    cursor: pointer;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    transition: transform 0.08s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
  }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }

  .btn-secondary {
    background: #fff;
    color: var(--coffee-dark);
    border: 2px solid #e6d4b8;
  }
  .btn-secondary:hover:not(:disabled) { background: var(--cream); }

  .btn-big {
    width: 100%;
    padding: 16px;
    margin-top: 12px;
    font-size: 18px;
  }

  .divider {
    display: flex; align-items: center;
    text-align: center;
    color: var(--coffee-mid);
    margin: 16px 0;
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1; height: 1px;
    background: #e6d4b8;
  }
  .divider span { padding: 0 12px; }

  .hide { display: none !important; }

  /* ---- Lobby ---- */
  .room-code-banner {
    background: var(--coffee-dark);
    color: var(--cream-light);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .room-code-banner .label { font-size: 12px; opacity: 0.8; }
  .room-code-banner .code {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.2em;
    font-family: "Courier New", monospace;
    margin-top: 4px;
  }
  .room-code-banner .copy-btn {
    background: var(--accent);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 8px;
    box-shadow: none;
  }

  .player-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .player-chip {
    background: #fff;
    border: 2px solid #e6d4b8;
    border-radius: 14px;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    position: relative;
    transition: all 0.15s;
  }
  .player-chip.alive.chosen {
    border-color: var(--success);
    background: #e7f7ee;
  }
  .player-chip.dead {
    opacity: 0.4;
    text-decoration: line-through;
  }
  .player-chip .host-star {
    position: absolute; top: -8px; right: -8px;
    font-size: 18px;
  }
  .player-chip .name { font-weight: 700; }
  .player-chip .status { font-size: 11px; color: var(--coffee-mid); }
  .player-chip.revealed .choice-emoji {
    font-size: 32px;
    animation: pop 0.4s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* ---- Game Area ---- */
  .round-banner {
    text-align: center;
    font-size: 14px;
    color: var(--coffee-mid);
    margin-bottom: 12px;
  }
  .round-banner .round-num {
    font-size: 22px;
    font-weight: 800;
    color: var(--coffee-dark);
  }

  .choice-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  .choice-btn {
    background: #fff;
    border: 3px solid #e6d4b8;
    border-radius: 20px;
    padding: 20px 8px;
    font-size: 14px;
    color: var(--coffee-dark);
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .choice-btn .emoji { font-size: 48px; line-height: 1; }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .choice-btn.selected {
    border-color: var(--accent-strong);
    background: #fff2e0;
    box-shadow: 0 0 0 4px rgba(255,154,60,0.3);
  }

  .status-line {
    margin-top: 16px;
    text-align: center;
    font-size: 15px;
    color: var(--coffee-mid);
    min-height: 22px;
  }

  .result-banner {
    margin-top: 14px;
    padding: 14px;
    border-radius: 14px;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
  }
  .result-banner.tie { background: #fff2e0; color: var(--accent-strong); }
  .result-banner.advance { background: #e7f7ee; color: var(--success); }

  /* ---- Finale ---- */
  .finale {
    text-align: center;
    padding: 20px 8px;
  }
  .finale .loser-emoji {
    font-size: 80px;
    animation: bounce 0.8s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(-12px); }
  }
  .finale h2 {
    margin: 8px 0 4px;
    font-size: 24px;
  }
  .finale .loser-name {
    font-size: 32px;
    color: var(--accent-strong);
    font-weight: 800;
  }
  .finale .message {
    margin: 12px 0;
    font-size: 16px;
    color: var(--coffee-mid);
  }
  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }
  .confetti span {
    position: absolute;
    top: -20px;
    font-size: 20px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  .small-note {
    font-size: 12px;
    color: var(--coffee-mid);
    margin-top: 8px;
    text-align: center;
  }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--coffee-dark);
    color: var(--cream-light);
    padding: 10px 18px;
    border-radius: 30px;
    font-size: 14px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 20;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <header class="brand">
    <h1>☕ コーヒーじゃんけん</h1>
    <div class="sub">最後に勝ち残った人が、みんなの分を奢る！</div>
  </header>

  <!-- ===== Home Screen ===== -->
  <section id="screen-home" class="card">
    <label for="name-input">あなたの名前</label>
    <input id="name-input" type="text" maxlength="20" placeholder="例: ゆうすけ" />

    <button id="btn-create" class="btn-primary btn-big">☕ 新しい部屋を作る</button>

    <div class="divider"><span>または</span></div>

    <label for="code-input">参加コード（4桁）</label>
    <input id="code-input" type="text" class="code" maxlength="4" placeholder="ABCD" />
    <button id="btn-join" class="btn-secondary btn-big">部屋に参加する</button>

    <p class="small-note">※ 同じ部屋にいる人同士でじゃんけんできます</p>
  </section>

  <!-- ===== Lobby / Game Screen ===== -->
  <section id="screen-room" class="card hide">

    <div class="room-code-banner">
      <div class="label">参加コード</div>
      <div class="code" id="room-code-display">----</div>
      <button id="btn-copy" class="copy-btn">コピー / URLで共有</button>
    </div>

    <div id="round-area" class="hide">
      <div class="round-banner">
        第 <span class="round-num" id="round-num">1</span> ラウンド
      </div>
    </div>

    <div id="player-list" class="player-list"></div>

    <div id="status-line" class="status-line"></div>
    <div id="result-banner" class="result-banner hide"></div>

    <div id="choice-area" class="hide">
      <div class="choice-buttons">
        <button class="choice-btn" data-choice="rock">
          <span class="emoji">✊</span><span>グー</span>
        </button>
        <button class="choice-btn" data-choice="scissors">
          <span class="emoji">✌️</span><span>チョキ</span>
        </button>
        <button class="choice-btn" data-choice="paper">
          <span class="emoji">✋</span><span>パー</span>
        </button>
      </div>
    </div>

    <div id="host-controls" class="hide">
      <button id="btn-start" class="btn-primary btn-big">ゲームを始める</button>
      <p class="small-note">※ 2人以上集まってから押してください</p>
    </div>

    <div id="finale-area" class="hide finale"></div>
    <div id="finale-controls" class="hide">
      <button id="btn-restart" class="btn-primary btn-big">同じメンバーでもう一度</button>
      <button id="btn-leave" class="btn-secondary btn-big">ホームに戻る</button>
    </div>
  </section>

</div>

<div id="toast" class="toast"></div>
<div id="confetti" class="confetti"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const CHOICE_EMOJI = { rock: '✊', paper: '✋', scissors: '✌️' };
  const CHOICE_LABEL = { rock: 'グー', paper: 'パー', scissors: 'チョキ' };

  const socket = io();

  let myId = null;
  let myName = '';
  let currentRoom = null;
  let myChoice = null;

  // ---------- Helpers ----------
  function showToast(msg, ms = 2000) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  function showScreen(screen) {
    $('#screen-home').classList.toggle('hide', screen !== 'home');
    $('#screen-room').classList.toggle('hide', screen !== 'room');
  }

  // ---------- Home actions ----------
  $('#btn-create').addEventListener('click', () => {
    const name = $('#name-input').value.trim();
    if (!name) return showToast('名前を入力してください');
    myName = name;
    socket.emit('room:create', { name }, (res) => {
      if (res && res.ok) {
        enterRoom(res.roomCode);
      } else {
        showToast('ルーム作成に失敗しました');
      }
    });
  });

  $('#btn-join').addEventListener('click', () => {
    const name = $('#name-input').value.trim();
    const code = $('#code-input').value.trim().toUpperCase();
    if (!name) return showToast('名前を入力してください');
    if (code.length !== 4) return showToast('参加コードは4桁です');
    myName = name;
    socket.emit('room:join', { name, roomCode: code }, (res) => {
      if (res && res.ok) {
        enterRoom(res.roomCode);
      } else {
        showToast(res.error || '参加できませんでした');
      }
    });
  });

  // URL ?room=XXXX が付いている場合は自動入力
  (() => {
    const params = new URLSearchParams(location.search);
    const room = params.get('room');
    if (room) $('#code-input').value = room.toUpperCase();
  })();

  // ---------- Room view ----------
  function enterRoom(roomCode) {
    $('#room-code-display').textContent = roomCode;
    showScreen('room');
    // URL に room を付与（履歴置換）
    const url = new URL(location.href);
    url.searchParams.set('room', roomCode);
    history.replaceState(null, '', url.toString());
  }

  $('#btn-copy').addEventListener('click', async () => {
    const code = $('#room-code-display').textContent;
    const url = `${location.origin}${location.pathname}?room=${code}`;
    try {
      await navigator.clipboard.writeText(url);
      showToast('共有URLをコピーしました');
    } catch {
      showToast(`URL: ${url}`);
    }
  });

  $('#btn-start').addEventListener('click', () => {
    socket.emit('game:start');
  });

  $('#btn-restart').addEventListener('click', () => {
    socket.emit('game:restart');
    clearConfetti();
  });

  $('#btn-leave').addEventListener('click', () => {
    location.href = location.pathname;
  });

  // じゃんけんの手を選ぶ
  $$('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = btn.getAttribute('data-choice');
      myChoice = choice;
      $$('.choice-btn').forEach(b => b.classList.toggle('selected', b === btn));
      socket.emit('game:choose', { choice });
    });
  });

  // ---------- Socket events ----------
  socket.on('connect', () => {
    myId = socket.id;
  });

  socket.on('room:update', (room) => {
    currentRoom = room;
    renderRoom(room);
  });

  socket.on('round:result', (result) => {
    renderRoundResult(result);
  });

  socket.on('game:over', (data) => {
    renderFinale(data);
  });

  socket.on('disconnect', () => {
    showToast('サーバーとの接続が切れました');
  });

  // ---------- Rendering ----------
  function renderRoom(room) {
    const isHost = room.hostId === myId;
    const phase = room.phase;

    // 参加者リスト
    const listEl = $('#player-list');
    listEl.innerHTML = '';
    room.players.forEach(p => {
      const el = document.createElement('div');
      el.className = 'player-chip';
      if (p.alive) el.classList.add('alive');
      else el.classList.add('dead');
      if (phase === 'playing' && p.hasChosen && p.alive) el.classList.add('chosen');
      if (p.choice) el.classList.add('revealed');

      const host = p.isHost ? '<span class="host-star" title="ホスト">👑</span>' : '';
      const meTag = p.id === myId ? '（あなた）' : '';
      let body;
      if (p.choice) {
        body = `<div class="choice-emoji">${CHOICE_EMOJI[p.choice]}</div>`;
      } else if (phase === 'playing' && p.alive) {
        body = `<div class="status">${p.hasChosen ? '✅ 選択済み' : '⏳ 選択中'}</div>`;
      } else if (phase === 'playing' && !p.alive) {
        body = `<div class="status">脱落</div>`;
      } else {
        body = `<div class="status">${phase === 'lobby' ? '待機中' : ''}</div>`;
      }
      el.innerHTML = `${host}<div class="name">${escapeHtml(p.name)}${meTag}</div>${body}`;
      listEl.appendChild(el);
    });

    // フェーズごとのUI切り替え
    const hostControls = $('#host-controls');
    const choiceArea = $('#choice-area');
    const roundArea = $('#round-area');
    const finaleArea = $('#finale-area');
    const finaleControls = $('#finale-controls');
    const statusLine = $('#status-line');
    const resultBanner = $('#result-banner');

    if (phase === 'lobby') {
      roundArea.classList.add('hide');
      choiceArea.classList.add('hide');
      finaleArea.classList.add('hide');
      finaleControls.classList.add('hide');
      resultBanner.classList.add('hide');
      hostControls.classList.toggle('hide', !isHost);
      $('#btn-start').disabled = room.players.length < 2;
      statusLine.textContent = room.players.length < 2
        ? '他のプレイヤーの参加を待っています…'
        : (isHost ? '準備ができたらゲームを始めてください' : 'ホストの開始を待っています…');
      myChoice = null;
      $$('.choice-btn').forEach(b => b.classList.remove('selected'));
    } else if (phase === 'playing') {
      hostControls.classList.add('hide');
      finaleArea.classList.add('hide');
      finaleControls.classList.add('hide');
      roundArea.classList.remove('hide');
      $('#round-num').textContent = room.round;

      const me = room.players.find(p => p.id === myId);
      if (me && me.alive) {
        choiceArea.classList.remove('hide');
        // 新ラウンドで手がリセットされたら選択解除
        if (!me.hasChosen) {
          $$('.choice-btn').forEach(b => { b.classList.remove('selected'); b.disabled = false; });
          myChoice = null;
        } else {
          $$('.choice-btn').forEach(b => b.disabled = true);
        }
      } else {
        choiceArea.classList.add('hide');
      }
      const aliveCount = room.players.filter(p => p.alive).length;
      const chosenCount = room.players.filter(p => p.alive && p.hasChosen).length;
      statusLine.textContent = me && me.alive
        ? (me.hasChosen ? `他のプレイヤーを待っています… (${chosenCount}/${aliveCount})` : '手を選んでください！')
        : `観戦中… (生存者 ${aliveCount}人)`;
    } else if (phase === 'finished') {
      hostControls.classList.add('hide');
      choiceArea.classList.add('hide');
      roundArea.classList.add('hide');
      statusLine.textContent = '';
    }
  }

  function renderRoundResult(result) {
    const banner = $('#result-banner');
    banner.classList.remove('hide', 'tie', 'advance');
    if (result.kind === 'tie') {
      banner.classList.add('tie');
      banner.textContent = `🤝 第${result.round}ラウンドは あいこ！ もう一度！`;
    } else {
      banner.classList.add('advance');
      const winEmo = CHOICE_EMOJI[result.winChoice];
      const loseEmo = CHOICE_EMOJI[result.loseChoice];
      banner.textContent = `${winEmo} の勝ち！ ${loseEmo} の人が脱落…`;
    }
    // しばらく表示
    setTimeout(() => banner.classList.add('hide'), 2500);
  }

  function renderFinale(data) {
    const area = $('#finale-area');
    area.classList.remove('hide');
    area.innerHTML = `
      <div class="loser-emoji">☕</div>
      <h2>今日のコーヒー係は…</h2>
      <div class="loser-name">${escapeHtml(data.loserName)} さん！</div>
      <div class="message">
        全員分のコーヒー、よろしくね ☕️🎉<br />
        <small>（${data.everyone.length}人分）</small>
      </div>
    `;
    $('#finale-controls').classList.remove('hide');
    $('#host-controls').classList.add('hide');
    $('#choice-area').classList.add('hide');
    $('#round-area').classList.add('hide');
    $('#status-line').textContent = '';
    // ホストだけ再戦ボタンが効くように見た目を変更
    $('#btn-restart').disabled = currentRoom && currentRoom.hostId !== myId;
    if (currentRoom && currentRoom.hostId !== myId) {
      $('#btn-restart').textContent = '同じメンバーでもう一度（ホスト待ち）';
    } else {
      $('#btn-restart').textContent = '同じメンバーでもう一度';
    }
    fireConfetti();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ---------- Confetti ----------
  function fireConfetti() {
    const host = $('#confetti');
    const emojis = ['☕','🎉','✨','🥐','🍪','🍩'];
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('span');
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.animationDuration = (2 + Math.random() * 2.5) + 's';
      s.style.animationDelay = (Math.random() * 1.2) + 's';
      s.style.fontSize = (16 + Math.random() * 20) + 'px';
      host.appendChild(s);
      setTimeout(() => s.remove(), 5000);
    }
  }
  function clearConfetti() { $('#confetti').innerHTML = ''; }

</script>
</body>
</html>
